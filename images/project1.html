<style>html.dark,html.dark body{background:#241016}html.dark body>div{background:#241016!important;border-color:#3a1c23!important}</style>

<style>
  .p1{width:100%;aspect-ratio:1;background:#fff5f7;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border-radius:12px;border:1px solid #f0c8d4}
  .bubble{position:absolute;border-radius:18px;padding:10px 16px;font-family:sans-serif;font-size:13px;font-weight:500;opacity:0;animation:pop 4s ease-in-out infinite}
  .b1{background:#f4c0d1;color:#72243e;left:15%;top:22%;animation-delay:0s;max-width:44%}
  .b2{background:#d4849a;color:#fff;right:12%;top:38%;animation-delay:1.2s;max-width:44%}
  .b3{background:#f4c0d1;color:#72243e;left:18%;top:56%;animation-delay:2.4s;max-width:44%}
  .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin:0 2px;animation:bounce 1s ease-in-out infinite}
  .d1{background:#d4849a;animation-delay:0s}
  .d2{background:#d4849a;animation-delay:.15s}
  .d3{background:#d4849a;animation-delay:.3s}
  .typing{position:absolute;right:14%;bottom:22%;background:#fce8ee;border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:2px;animation:fade 4s ease-in-out infinite;animation-delay:3.2s;opacity:0}
  .icon{position:absolute;top:14%;left:50%;transform:translateX(-50%);width:44px;height:44px;border-radius:50%;background:#d4849a;display:flex;align-items:center;justify-content:center;animation:pulse 3s ease-in-out infinite}
  .icon svg{width:22px;height:22px;fill:#fff}
  @keyframes pop{0%,100%{opacity:0;transform:translateY(8px)}15%,75%{opacity:1;transform:translateY(0)}}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(212,132,154,.4)}50%{box-shadow:0 0 0 10px rgba(212,132,154,0)}}
  @keyframes fade{0%,100%{opacity:0}30%,70%{opacity:1}}
</style>
<div class="p1">
  <div class="icon">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l4.93-1.37A9.94 9.94 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm1 14H7v-2h6v2zm2-4H7V10h8v2zm0-4H7V6h8v2z"/></svg>
  </div>
  <div class="bubble b1">How do I list a new product?</div>
  <div class="bubble b2">I can help! Go to Inventory → Add a Product…</div>
  <div class="bubble b3">What's my current sales rank?</div>
  <div class="typing"><span class="dot d1"></span><span class="dot d2"></span><span class="dot d3"></span></div>
</div>
