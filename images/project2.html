
<style>
  .p2{width:100%;aspect-ratio:1;background:#fff5f7;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border-radius:12px;border:1px solid #f0c8d4}
  .flask{position:absolute;left:50%;top:50%;transform:translate(-50%,-54%)}
  .molecule{position:absolute;width:10px;height:10px;border-radius:50%;animation:orbit 3s linear infinite}
  .m1{background:#d4849a;top:20%;left:30%;animation-duration:2.8s;animation-delay:0s}
  .m2{background:#b5667a;top:28%;right:26%;animation-duration:3.5s;animation-delay:.5s}
  .m3{background:#e8aab8;top:40%;left:20%;animation-duration:4s;animation-delay:1s}
  .m4{background:#d4849a;bottom:30%;right:20%;animation-duration:3.2s;animation-delay:1.5s}
  .m5{background:#b5667a;bottom:22%;left:32%;animation-duration:2.6s;animation-delay:.8s}
  .bar-wrap{position:absolute;bottom:10%;left:50%;transform:translateX(-50%);display:flex;gap:8px;align-items:flex-end;height:50px}
  .bar{width:18px;border-radius:4px 4px 0 0;animation:grow 2.5s ease-in-out infinite alternate}
  .bar:nth-child(1){background:#e8aab8;animation-delay:0s}
  .bar:nth-child(2){background:#d4849a;animation-delay:.2s}
  .bar:nth-child(3){background:#b5667a;animation-delay:.4s}
  .bar:nth-child(4){background:#d4849a;animation-delay:.6s}
  .bar:nth-child(5){background:#e8aab8;animation-delay:.8s}
  .label-safe{position:absolute;top:12%;left:50%;transform:translateX(-50%);font-family:sans-serif;font-size:12px;font-weight:600;color:#b5667a;letter-spacing:1px;text-transform:uppercase;animation:fadein 2s ease-in-out infinite alternate}
  @keyframes orbit{0%{transform:translateY(0) scale(1);opacity:.7}50%{transform:translateY(-12px) scale(1.3);opacity:1}100%{transform:translateY(0) scale(1);opacity:.7}}
  @keyframes grow{from{height:15px}to{height:48px}}
  @keyframes fadein{from{opacity:.4}to{opacity:1}}
</style>
<div class="p2">
  <div class="label-safe">Toxicity Analysis</div>
  <svg class="flask" width="90" height="110" viewBox="0 0 90 110">
    <path d="M32 8 L32 52 L8 95 Q6 102 14 105 L76 105 Q84 102 82 95 L58 52 L58 8 Z" fill="#fce8ee" stroke="#d4849a" stroke-width="2"/>
    <path d="M36 62 Q45 58 54 62 L72 95 Q76 102 68 104 L22 104 Q14 102 18 95 Z" fill="#f4c0d1" opacity=".7"/>
    <rect x="28" y="4" width="34" height="6" rx="3" fill="#d4849a"/>
    <circle cx="38" cy="80" r="5" fill="#b5667a" opacity=".6">
      <animate attributeName="cy" values="80;72;80" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="52" cy="88" r="3" fill="#d4849a" opacity=".8">
      <animate attributeName="cy" values="88;82;88" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </svg>
  <div class="molecule m1"></div>
  <div class="molecule m2"></div>
  <div class="molecule m3"></div>
  <div class="molecule m4"></div>
  <div class="molecule m5"></div>
  <div class="bar-wrap">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>
</div>
