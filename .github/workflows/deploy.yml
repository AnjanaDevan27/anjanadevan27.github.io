name: Deploy to GitHub Pages

# Builds the React app in react-portfolio/ and publishes it as the site root ( / ),
# replacing the old static site. The React app links to /images, /projects, and
# /resume via absolute paths, so those folders are copied alongside it. The old
# static files (index.html, style.css, script.js) are no longer published.
#
# NOTE: this only takes effect once Pages "Source" is set to "GitHub Actions"
# in repo Settings → Pages. Until then, nothing about the live site changes.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: react-portfolio/package-lock.json

      - name: Build React app
        working-directory: react-portfolio
        run: |
          npm ci
          npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          # React app → site root
          cp -r react-portfolio/dist/. _site/
          # Assets the React app links to via absolute paths (/images, /projects, /resume)
          cp -r images projects resume _site/ 2>/dev/null || true
          # Disable Jekyll processing
          touch _site/.nojekyll

      - name: Check for broken links
        run: |
          # No -s / SPA fallback: with it, serve returns 200 for every path
          # (masking 404s) so the link check would never catch a broken link.
          # cleanUrls/trailingSlash false serves literal paths (no .html rewrite),
          # matching GitHub Pages so relative links resolve the same way here.
          printf '{ "cleanUrls": false, "trailingSlash": false }\n' > _site/serve.json
          npx serve _site -l 8080 &
          npx wait-on http://localhost:8080
          # The root is a client-rendered React SPA, so linkinator (no JS) only
          # sees the static shell. Seed the project pages so their back-links get
          # crawled too.
          SEEDS="http://localhost:8080"
          for i in 1 2 3 4 5 6; do
            SEEDS="$SEEDS http://localhost:8080/projects/project$i.html"
          done
          npx linkinator $SEEDS --recurse --skip "^(?!http://localhost)" || (echo "Broken links found — blocking deploy" && exit 1)
          # Don't publish the local-only serve config to the live site.
          rm -f _site/serve.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4