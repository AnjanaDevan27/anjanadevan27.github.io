name: Deploy to GitHub Pages

# Builds the React app in react-portfolio/ and publishes a single Pages
# artifact that contains BOTH sites:
#   - the existing static site at the root ( / )
#   - the React app at            /portfolio/
#
# NOTE: this only takes effect once Pages "Source" is set to "GitHub Actions"
# in repo Settings → Pages. Until then, nothing about the live site changes.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: react-portfolio/package-lock.json

      - name: Build React app
        working-directory: react-portfolio
        run: |
          npm ci
          npm run build

      - name: Assemble combined site
        run: |
          mkdir -p _site/portfolio
          # Existing static site → root. Copy known top-level assets only.
          cp index.html style.css script.js _site/ 2>/dev/null || true
          cp -r images projects resume _site/ 2>/dev/null || true
          # React app → /portfolio
          cp -r react-portfolio/dist/. _site/portfolio/
          # Disable Jekyll processing
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
